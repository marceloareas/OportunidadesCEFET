<app-navbar-top></app-navbar-top>
<div class="page">
  <app-navbar-left></app-navbar-left>

  <main class="content">
    <div class="scroll-content">
      <section class="oportunidades-container">
        <h2 class="titulo-principal">Minhas discussões</h2>
        <hr />

        <div *ngIf="carregando()" class="mensagem-status">Carregando publicações...</div>
        <div *ngIf="erro()" class="mensagem-erro">{{ erro() }}</div>

        <div *ngIf="!carregando() && minhasPublicacoes().length === 0" class="mensagem-vazia">
          Você ainda não tem publicações.
        </div>

        <div *ngIf="!carregando() && minhasPublicacoes().length > 0">
          <ng-container *ngFor="let p of minhasPublicacoes()">
            <article class="post-item" style="display: flex; align-items: center; gap: 12px;">
              <!-- <img [src]="(usuarioLogado()?.imagemPerfil || p.imagemPerfil) || 'pfptemp.ico'" alt="Foto de perfil" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;" /> -->
              <div>
                <h3>{{ p.titulo }}</h3>
                <div class="meta">{{ p.criado ? (p.criado | date:'short') : '' }}</div>
                <p>{{ p.corpo }}</p>
              </div>
            </article>
          </ng-container>
          <div class="feed-footer" *ngIf="minhasPublicacoes().length > 0">
            <div *ngIf="carregando()" class="feed-state loading">
              <div class="loader"></div>
              <span>Carregando mais publicações...</span>
            </div>

            <button
              *ngIf="!carregando() && hasMore()"
              class="feed-load-btn"
              (click)="carregarMaisPublicacoes()"
            >
              <span>Carregar mais</span>
              <i class="bi bi-arrow-down"></i>
            </button>

            <div *ngIf="!carregando() && !hasMore()" class="feed-state end">
              <div>
                <strong>Fim das publicações</strong>
                <p>Você viu tudo por enquanto</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <app-navbar-right></app-navbar-right>
</div>
