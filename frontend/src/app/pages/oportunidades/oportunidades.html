<app-navbar-top></app-navbar-top>
<div class="page">
  <app-navbar-left></app-navbar-left>

  <main class="content">
    <div class="scroll-content">
      <div class="cabecalho-pagina">
        <h2 class="titulo-principal">Oportunidades</h2>
        <button *ngIf="usuarioFuncao === 'professor'" class="btn-nova-oportunidade" type="button" (click)="novaOportunidade()">
          Criar nova oportunidade
        </button>
      </div>
      <div *ngIf="erro()" class="mensagem-erro">{{ erro() }}</div>

      <section *ngIf="usuarioFuncao === 'professor'">
        <h3>Minhas oportunidades</h3>

        <div *ngIf="carregando() && minhasOportunidades().length === 0" class="cards-skeleton">
          <div class="card-skeleton" *ngFor="let item of [1,2,3]">
            <div class="card-skeleton-head">
              <div class="skeleton skeleton-avatar"></div>

              <div class="card-skeleton-info">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
              </div>

              <div class="skeleton skeleton-badge"></div>
            </div>

            <div class="card-skeleton-body">
              <div class="skeleton skeleton-line long"></div>
              <div class="skeleton skeleton-line long"></div>
              <div class="skeleton skeleton-line medium"></div>
            </div>

            <div class="card-skeleton-actions">
              <div class="skeleton skeleton-btn"></div>
              <div class="skeleton skeleton-btn"></div>
            </div>
          </div>
        </div>

        <div class="mensagem-vazia" *ngIf="!carregando() && minhasOportunidades().length === 0">
          Você ainda não possui oportunidades criadas.
        </div>
        <div class="feed-cards">
          <app-post *ngFor="let op of minhasOportunidades()" [post]="oportunidadeComoFeedItem(op)"></app-post>
          <div class="feed-footer" *ngIf="minhasOportunidades().length > 0">
            <div *ngIf="carregando()" class="feed-state loading">
              <div class="loader"></div>
              <span>Carregando mais publicações...</span>
            </div>

            <button
              *ngIf="!carregando() && hasMoreOportunidades()"
              class="feed-load-btn"
              (click)="carregarMaisOportunidades()"
            >
              <span>Carregar mais</span>
              <i class="bi bi-arrow-down"></i>
            </button>

            <div *ngIf="!carregando() && !hasMoreOportunidades()" class="feed-state end">
              <div>
                <strong>Fim das publicações</strong>
                <p>Você viu tudo por enquanto</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section *ngIf="usuarioFuncao !== 'professor'">
        <h3>Minhas candidaturas</h3>

        <div *ngIf="carregando() && candidaturas().length === 0" class="cards-skeleton">
          <div class="card-skeleton" *ngFor="let item of [1,2,3]">
            <div class="card-skeleton-head">
              <div class="skeleton skeleton-avatar"></div>

              <div class="card-skeleton-info">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
              </div>

              <div class="skeleton skeleton-badge"></div>
            </div>

            <div class="card-skeleton-body">
              <div class="skeleton skeleton-line long"></div>
              <div class="skeleton skeleton-line long"></div>
              <div class="skeleton skeleton-line medium"></div>
            </div>
          </div>
        </div>

        <div class="mensagem-vazia" *ngIf="!carregando() && candidaturas().length === 0">
          Você ainda não se candidatou a oportunidades.
        </div>
        <div class="feed-cards">
          <app-post *ngFor="let op of candidaturas()" [post]="oportunidadeComoFeedItem(op)"></app-post>
        </div>
      </section>
    </div>
  </main>

  <app-navbar-right></app-navbar-right>
</div>
