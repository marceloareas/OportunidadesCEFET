<app-navbar-top></app-navbar-top>
<div class="page">
  <app-navbar-left></app-navbar-left>

    <main class="content">
            <div class="profile">
              <div style="padding: 3vh 4vw; max-width: 800px; margin: auto;">
                <h2>Editar Perfil</h2>
                <form (submit)="onSubmit($event)">
                  <div class="input-row">
                    <div class="input-group" style="flex:1;">
                      <label for="nome">Nome</label>
                      <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Digite seu nome"
                        required
                        [value]="nome()"
                        (input)="nome.set($any($event.target).value)"
                      />
                    </div>

                    <div class="input-group" style="flex:1;">
                      <label for="email">E-mail</label>
                      <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required
                        [value]="email()"
                        (input)="email.set($any($event.target).value)"
                      />
                    </div>
                  </div>

                  <div class="input-row">
                    <div class="input-group" style="flex:1;">
                      <label for="senha">Senha (deixe em branco para manter)</label>
                      <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Nova senha"
                        (input)="senha.set($any($event.target).value)"
                      />
                    </div>

                    <div class="input-group" style="flex:1;">
                      <label for="confirmaSenha">Confirmar Senha</label>
                      <input
                        type="password"
                        id="confirmaSenha"
                        name="confirmaSenha"
                        placeholder="Confirme a nova senha"
                        (input)="confirmaSenha.set($any($event.target).value)"
                      />
                    </div>
                  </div>

                  <div class="input-group">
                    <label for="imagemPerfil">Imagem de Perfil</label>
                    <input
                      type="file"
                      id="imagemPerfil"
                      name="imagemPerfil"
                      accept="image/*"
                      (change)="onImageSelected($event)"
                    />
                  </div>
                  <div *ngIf="imagemPreview" style="margin-bottom: 1em;">
                    <img [src]="imagemPreview" style="max-width: 120px; max-height: 120px; border-radius: 50%; border: 1px solid #ccc;" />
                  </div>
                  <div class="form-actions">
                    <button type="submit" class="send-btn">Salvar</button>
                    <a href="/home" class="cancel-link" (click)="$event.preventDefault(); onCancel()">Cancelar</a>
                  </div>
                </form>
              </div>
            </div>
    </main>
</div>
